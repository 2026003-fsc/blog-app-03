<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('ブログ一覧')}"></head>

<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    

    <div th:each="blog : ${blogs}" class="box">
        <h3><a th:href="@{/blogs/{id}(id=${blog.id})}" th:text="${blog.title}">タイトル</a></h3>
        <p th:text="${blog.contents}">投稿の内容</p>
    </div>
    <p th:if="${#lists.isEmpty(blogs)}">該当するブログはありません</p>

</body>

</html>
