<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('ブログの編集')}"></head>
<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <h1>ブログの編集</h1>
    <form th:action="@{/blogs/{id}(id=${blogId})}" th:object="${blogForm}" method="post">
        <div>
            <label for="title">タイトル</label>
            <input type="text" th:field="*{title}">
        </div>
        <div>
            <label for="contents">投稿内容</label>
            <textarea name="contents" id="contents" th:field="*{contents}" rows="10" cols="50"></textarea>
        </div>
        <button type="submit">更新</button>
    </form>
</body>
</html>
