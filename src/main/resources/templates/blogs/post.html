<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('ブログの投稿')}">
</head>
<body>
    <header th:replace="~{fragments/layout :: header}"></header>
    <main>
        <form th:action="@{/blogs}" method="post">
            <label for="title">タイトル</label><br>
            <input type="text" id="title" name="title"><br>
            <label for="contents">投稿内容</label><br>
            <textarea id="contents" name="contents" rows="10" cols="50"></textarea> <br>
            <button type="submit">保存</button>
        </form>
    </main>
</body>
</html>
